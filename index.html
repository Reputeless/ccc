<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CCC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/app.css">
  <script defer src="assets/common.js"></script>
  <script defer src="assets/index.js"></script>
</head>
<body class="page-shell">
  <header class="site-header">
    <div class="site-header-inner">
      <section class="hero-card" aria-labelledby="app-name">
        <p class="eyebrow">C Code Checker</p>
        <h1 id="app-name">CCC</h1>
        <p id="app-subtitle" class="page-lead">C プログラミングの自習と理解度確認のための演習環境です。</p>
      </section>
    </div>
  </header>

  <main class="content-stack">
    <div class="dashboard-layout">
      <aside class="panel filter-panel" aria-labelledby="filters-heading">
        <div class="panel-heading">
          <div>
            <p class="section-kicker">Filters</p>
            <h2 id="filters-heading">フィルタ</h2>
          </div>
          <button id="reset-filters" class="secondary-button" type="button">フィルタをクリア</button>
        </div>

        <div class="filter-grid">
          <div class="filter-inline-row">
            <label class="field">
              <span>講義回の下限</span>
              <input id="lecture-min" type="number" min="1" inputmode="numeric">
            </label>
            <label class="field">
              <span>講義回の上限</span>
              <input id="lecture-max" type="number" min="1" inputmode="numeric">
            </label>
          </div>
          <label class="field">
            <span>解いたかどうか</span>
            <select id="solved-filter">
              <option value="all">すべて表示</option>
              <option value="solved">解いた問題だけを表示</option>
              <option value="unsolved">解いていない問題だけを表示</option>
            </select>
          </label>
          <label class="field">
            <span>理解度</span>
            <select id="understanding-filter">
              <option value="all">すべて</option>
            </select>
          </label>
          <label class="field field-wide">
            <span>並び順</span>
            <select id="sort-order">
              <option value="lectureAsc">講義回が小さい順</option>
              <option value="lectureDesc">講義回が大きい順</option>
              <option value="numberAsc">問題番号が小さい順</option>
              <option value="numberDesc">問題番号が大きい順</option>
              <option value="understandingHigh">理解度が高い順</option>
              <option value="understandingLow">理解度が低い順</option>
            </select>
          </label>
        </div>

        <fieldset class="field-group">
          <legend>難易度</legend>
          <div id="difficulty-options" class="chip-row"></div>
        </fieldset>

        <div class="active-filters">
          <span class="active-filters-label">現在のフィルタ</span>
          <div id="active-filter-list" class="active-filter-list"></div>
        </div>

        <section class="learning-summary" aria-labelledby="learning-summary-heading">
          <h3 id="learning-summary-heading" class="learning-summary-title">表示中の状況</h3>
          <dl class="learning-summary-list">
            <div class="learning-summary-row">
              <dt>解いた問題</dt>
              <dd id="summary-solved-count">0 / 0</dd>
            </div>
            <div class="learning-summary-row">
              <dt>要復習</dt>
              <dd id="summary-review-count">0</dd>
            </div>
          </dl>
        </section>
      </aside>

      <section class="panel list-panel" aria-labelledby="problems-heading">
        <div class="panel-heading">
          <div>
            <p class="section-kicker">Problem List</p>
            <h2 id="problems-heading">問題一覧</h2>
          </div>
          <p id="problem-count" class="muted-text">読み込み中...</p>
        </div>
        <div id="list-message" class="status-banner" hidden></div>
        <div id="problem-list" class="problem-list" aria-live="polite"></div>
      </section>
    </div>
  </main>
  <footer class="site-footer">
    <div class="site-footer-inner">
      <p id="global-footer-copyright" class="site-footer-copy">© CCC</p>
    </div>
  </footer>
</body>
</html>
